name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pipeline
          POSTGRES_PASSWORD: pipeline
          POSTGRES_DB: pipeline_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://pipeline:pipeline@localhost:5432/pipeline_test
      REDIS_URL: redis://localhost:6379/0
      STORAGE_ROOT: /tmp/storage
      COMFYUI_URL: http://localhost:8188
      OPENAI_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: apps/api
        run: uv pip install --system -e ".[dev]" && uv pip install --system -e "../../packages/shared"

      - name: Lint
        working-directory: apps/api
        run: ruff check app tests

      - name: Run migrations
        working-directory: apps/api
        run: alembic upgrade head

      - name: Run tests
        working-directory: apps/api
        run: pytest tests/ -x -q

  dashboard:
    name: Dashboard (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci

      - name: Lint
        working-directory: apps/dashboard
        run: npm run lint

      - name: Build
        working-directory: apps/dashboard
        run: npm run build
