services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai2d_flow
      POSTGRES_USER: ai2d
      POSTGRES_PASSWORD: ai2d_pass
      
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai2d -d ai2d_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai2d:ai2d_pass@postgres:5432/ai2d_flow
      - REDIS_URL=redis://redis:6379/0
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai2d:ai2d_pass@postgres:5432/ai2d_flow
      - REDIS_URL=redis://redis:6379/0
    command: uv run python worker.py

volumes:
  pgdata:
  redisdata:
